<!DOCTYPE html>
<html>
<head>
    <title>Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <!-- Lista simples de mensagens -->
        <ul class="alert alert-info">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <h1 class="text-center mb-4">Bem-vindo à Biblioteca</h1>

    <div class="list-group">
        <a href="/emprestimos" class="list-group-item 
        list-group-item-action">
            Ver Empréstimos</a>
        <a href="/usuarios" class="list-group-item 
        list-group-item-action">Ver Usuários </a>
        <a href="/cadastro_usuario" class="list-group-item
         list-group-item-action">
            Cadastrar Usuário</a>
        <a href="/cadastro_emprestimo" class="list-group-item
         list-group-item-action">
            Cadastrar Empréstimo</a>
    </div>

</body>
</html>
