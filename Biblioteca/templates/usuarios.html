<!-- 
    Página: usuarios.html
    Função: Exibe a lista de usuários cadastrados na biblioteca.
    Esta página é renderizada pela rota Flask '/usuarios'.
    O template recebe uma variável chamada 'usuarios' com os dados vindos do banco.
-->

<!DOCTYPE html>
<html>
<head>
    <title>Usuários</title>

    <!-- Importa o CSS do Bootstrap (para deixar a tabela e os botões estilizados) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<!-- 
    A classe "container" centraliza o conteúdo e "mt-4" adiciona uma margem superior (margin-top: 4)
-->
<body class="container mt-4">
    <!-- Título principal da página -->
    <h1 class="mb-4">Lista de Usuários</h1>
    <!-- 
        Cria uma tabela estilizada com Bootstrap
        table-striped → linhas alternadas com cor
        table-bordered → bordas visíveis
    -->
    <table class="table table-striped table-bordered">
        
        <!-- Cabeçalho da tabela -->
        <thead class="table-dark">
            <tr>
                <th>CPF</th>
                <th>RG</th>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Celular</th>
                <th>Endereço</th>
            </tr>
        </thead>

        <!-- Corpo da tabela: preenche com os dados dos usuários -->
        <tbody>
            <!-- 
                Loop Jinja2: percorre a lista 'usuarios' passada pelo Flask.
                Para cada 'usuario' na lista, cria uma nova linha <tr>.
            -->
            {% for usuario in usuarios %}
            <tr>
                <!-- 
                    Exibe os valores de cada campo.
                    O uso de {} indica uma expressão Jinja2, que será substituída
                    pelo valor real enviado pelo backend Flask.
                -->
                <td>{{ usuario['CPF'] }}</td>
                <td>{{ usuario['RG'] }}</td>
                <td>{{ usuario['Nome'] }}</td>
                <td>{{ usuario['Telefone'] }}</td>
                <td>{{ usuario['Celular'] }}</td>
                <td>{{ usuario['Endereco'] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <!-- Botão para voltar à página inicial -->
    <a href="/" class="btn btn-secondary">Voltar</a>

</body>
</html>
