{% extends 'base.html' %}
{% block title %}Cadastrar Receita{% endblock %}
{% block page_title %}Cadastrar Receita / Tratamento{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-9">
<div class="card">
    <div class="card-header">
        <i class="bi bi-file-earmark-medical"></i>
        <strong>Dados da Receita / Tratamento</strong>
    </div>
    <div class="card-body p-4">
        <form action="{{ url_for('cadastro_receita') }}" method="POST">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Código da Receita</label>
                    <input type="number" name="codigo_receita" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Código do Tratamento</label>
                    <input type="number" name="codigo_tratamento" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Data de Prescrição</label>
                    <input type="date" name="data_prescricao" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nome da Fórmula</label>
                    <input type="text" name="nome_formula" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nome do Tratamento</label>
                    <input type="text" name="nome_tratamento" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Dosagem</label>
                    <input type="text" name="dosagem" class="form-control" placeholder="Ex.: 500mg 2x/dia">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Duração</label>
                    <input type="text" name="duracao" class="form-control" placeholder="Ex.: 7 dias">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option>Ativo</option>
                        <option>Concluído</option>
                        <option>Suspenso</option>
                        <option>Pendente</option>
                    </select>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-teal">
                    <i class="bi bi-check-lg me-1"></i> Salvar Receita
                </button>
                <a href="{{ url_for('receitas') }}" class="btn btn-outline-slate">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
