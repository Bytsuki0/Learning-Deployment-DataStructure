{% extends 'base.html' %}
{% block title %}Cadastrar Profissional{% endblock %}
{% block page_title %}Cadastrar Profissional{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">
<div class="card">
    <div class="card-header">
        <i class="bi bi-person-badge"></i>
        <strong>Dados do Profissional</strong>
    </div>
    <div class="card-body p-4">
        <form action="{{ url_for('cadastro_profissional') }}" method="POST">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Código</label>
                    <input type="number" name="codigo" class="form-control" required>
                </div>
                <div class="col-md-8">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Função</label>
                    <input type="text" name="funcao" class="form-control" placeholder="Ex.: Médico, Enfermeiro">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Especialidade</label>
                    <input type="text" name="especialidade" class="form-control" placeholder="Ex.: Cardiologia">
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-teal">
                    <i class="bi bi-check-lg me-1"></i> Salvar Profissional
                </button>
                <a href="{{ url_for('profissionais') }}" class="btn btn-outline-slate">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
