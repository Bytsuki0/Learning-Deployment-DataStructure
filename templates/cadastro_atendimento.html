{% extends 'base.html' %}
{% block title %}Cadastrar Atendimento{% endblock %}
{% block page_title %}Cadastrar Atendimento{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-8">
<div class="card">
    <div class="card-header">
        <i class="bi bi-calendar-plus"></i>
        <strong>Dados do Atendimento</strong>
    </div>
    <div class="card-body p-4">
        <form action="{{ url_for('cadastro_atendimento') }}" method="POST">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Código do Atendimento</label>
                    <input type="number" name="codigo" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Data</label>
                    <input type="date" name="data" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Hora</label>
                    <input type="time" name="hora" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Paciente</label>
                    <select name="codigo_paciente" class="form-select" required>
                        <option value="">Selecione...</option>
                        {% for p in pacientes %}
                        <option value="{{ p['Codigo_Paciente'] }}">{{ p['Nome'] }} ({{ p['Codigo_Paciente'] }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Profissional</label>
                    <select name="codigo_profissional" class="form-select" required>
                        <option value="">Selecione...</option>
                        {% for pr in profissionais %}
                        <option value="{{ pr['Codigo_profissional'] }}">{{ pr['Nome'] }} — {{ pr['Funcao'] }} ({{ pr['Codigo_profissional'] }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option>Agendado</option>
                        <option>Em Andamento</option>
                        <option>Concluído</option>
                        <option>Pendente</option>
                        <option>Cancelado</option>
                    </select>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-teal">
                    <i class="bi bi-check-lg me-1"></i> Salvar Atendimento
                </button>
                <a href="{{ url_for('atendimentos') }}" class="btn btn-outline-slate">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
