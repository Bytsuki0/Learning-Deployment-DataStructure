<!-- 
    Página: cadastro_usuario.html
    Função: Exibe o formulário para cadastrar um novo usuário na biblioteca.
    Esta página é renderizada pela rota Flask '/cadastro_usuario'.

    Quando o formulário é enviado (POST), os dados são capturados em app.py
    e inseridos no banco de dados através da função adicionar_usuario().
-->

<!DOCTYPE html>
<html>
<head>
    <title>Cadastro de Usuário</title>
    <!-- Importa o Bootstrap para facilitar a formatação e o layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <!-- Título principal -->
    <h1 class="mb-4">Cadastro de Novo Usuário</h1>
    <!-- 
        Exibe mensagens enviadas pelo Flask usando flash().
        Essas mensagens aparecem quando o cadastro é bem-sucedido ou ocorre erro.
    -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <!-- Lista simples de mensagens -->
        <ul class="alert alert-info">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <!-- 
        Formulário de cadastro.
        method="POST" → envia os dados para o servidor quando o botão "Cadastrar" é clicado.
        class="row g-3" → organiza os campos em grid, com espaçamento entre eles.
    -->
    <form method="POST" class="row g-3">

        <!-- Campo CPF -->
        <div class="col-md-6">
            <label class="form-label">CPF</label>
            <input type="text" class="form-control" 
            name="cpf" required>
        </div>

        <!-- Campo RG -->
        <div class="col-md-6">
            <label class="form-label">RG</label>
            <input type="text" class="form-control"
            name="rg" required>
        </div>

        <!-- Campo Nome -->
        <div class="col-md-12">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" 
            name="nome" required>
        </div>

        <!-- Campo Telefone -->
        <div class="col-md-6">
            <label class="form-label">Telefone</label>
            <input type="text" class="form-control" 
            name="telefone">
        </div>

        <!-- Campo Celular -->
        <div class="col-md-6">
            <label class="form-label">Celular</label>
            <input type="text" class="form-control" 
            name="celular">
        </div>

        <!-- Campo Endereço -->
        <div class="col-md-12">
            <label class="form-label">Endereço</label>
            <input type="text" class="form-control"
             name="endereco" required>
        </div>

        <!-- Botões -->
        <div class="col-12">
            <!-- Botão que envia o formulário -->
            <button type="submit" 
            class="btn btn-primary">Cadastrar</button>

            <!-- Botão para voltar à página inicial -->
            <a href="/" class="btn btn-secondary">Voltar</a>
        </div>
    </form>

    <!-- Espaçamento e link adicional de retorno -->
    <br>
    <a href="/" class="btn btn-secondary">Voltar</a>
</body>
</html>
