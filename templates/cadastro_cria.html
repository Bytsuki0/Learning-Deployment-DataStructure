{% extends 'base.html' %}
{% block title %}Nova Associação Profissional ↔ Receita{% endblock %}
{% block page_title %}Nova Associação: Profissional ↔ Receita{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">
<div class="card">
    <div class="card-header">
        <i class="bi bi-link-45deg"></i>
        <strong>Vincular Profissional a uma Receita</strong>
    </div>
    <div class="card-body p-4">
        <form action="{{ url_for('cadastro_cria') }}" method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Receita / Tratamento</label>
                    <select name="codigo_receita" class="form-select" required>
                        <option value="">Selecione...</option>
                        {% for r in receitas %}
                        <option value="{{ r['Codigo_receita'] }}">
                            {{ r['Nome_formula'] or r['Nome_tratamento'] or '—' }} ({{ r['Codigo_receita'] }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Profissional</label>
                    <select name="codigo_profissional" class="form-select" required>
                        <option value="">Selecione...</option>
                        {% for pr in profissionais %}
                        <option value="{{ pr['Codigo_profissional'] }}">
                            {{ pr['Nome'] }} — {{ pr['Funcao'] }} ({{ pr['Codigo_profissional'] }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-teal">
                    <i class="bi bi-check-lg me-1"></i> Salvar Associação
                </button>
                <a href="{{ url_for('cria') }}" class="btn btn-outline-slate">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
