<!DOCTYPE html>
<html>
<head>
    <title>Empréstimos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="container mt-4">
    <!-- Título principal da página -->
    <h1 class="mb-4">Lista de Usuários</h1>
    <!-- 
        Cria uma tabela estilizada com Bootstrap
        table-striped → linhas alternadas com cor
        table-bordered → bordas visíveis
    -->
    <table class="table table-striped table-bordered">
        
        <!-- Cabeçalho da tabela -->
        <thead class="table-dark">
        <tr>
            <th>Código</th>
            <th>Usuário</th>
            <th>Título do Livro</th>
            <th>Data do Empréstimo</th>
            <th>Data da Devolução</th>
        </tr>
        </thead>
        {% for row in emprestimos %}
        <tr>
            <td>{{ row['Codigo'] }}</td>
            <td>{{ row['Data_do_Emprestimo'] }}</td>
            <td>{{ row['Data_da_Devolucao'] }}</td>
            <td>{{ row['FK_Usuario_CPF'] }}</td>
            <td>{{ row['FK_Usuario_RG'] }}</td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <a href="/" class="btn btn-secondary">Voltar</a>
</body>
</html>
