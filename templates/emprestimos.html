<!DOCTYPE html>
<html>
<head>
    <title>Empréstimos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <h1>Detalhes dos Empréstimos</h1>
    <table border="1">
        <tr>
            <th>Código</th>
            <th>Usuário</th>
            <th>Título do Livro</th>
            <th>Data do Empréstimo</th>
            <th>Data da Devolução</th>
        </tr>
        {% for row in emprestimos %}
        <tr>
            <td>{{ row['Codigo'] }}</td>
            <td>{{ row['Data_do_Emprestimo'] }}</td>
            <td>{{ row['Data_da_Devolucao'] }}</td>
            <td>{{ row['FK_Usuario_CPF'] }}</td>
            <td>{{ row['FK_Usuario_RG'] }}</td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <a href="/">Voltar ao início</a>
</body>
</html>
