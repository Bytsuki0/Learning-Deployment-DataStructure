{% extends 'base.html' %}
{% block title %}Cadastrar Paciente{% endblock %}
{% block page_title %}Cadastrar Paciente{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-8">
<div class="card">
    <div class="card-header">
        <i class="bi bi-person-plus"></i>
        <strong>Dados do Paciente</strong>
    </div>
    <div class="card-body p-4">
        <form action="{{ url_for('cadastro_paciente') }}" method="POST">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Código do Paciente</label>
                    <input type="number" name="codigo" class="form-control" required>
                </div>
                <div class="col-md-8">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Idade</label>
                    <input type="number" name="idade" class="form-control" min="0" max="130" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Cargo / Ocupação</label>
                    <input type="text" name="cargo" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Data de Nascimento</label>
                    <input type="date" name="data_nascimento" class="form-control" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Histórico Médico</label>
                    <textarea name="historico" class="form-control" rows="4" placeholder="Descreva o histórico médico do paciente..."></textarea>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-teal">
                    <i class="bi bi-check-lg me-1"></i> Salvar Paciente
                </button>
                <a href="{{ url_for('pacientes') }}" class="btn btn-outline-slate">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
