{% extends 'base.html' %}
{% block title %}Cadastrar Diagnóstico{% endblock %}
{% block page_title %}Cadastrar Diagnóstico{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-8">
<div class="card">
    <div class="card-header">
        <i class="bi bi-clipboard2-plus"></i>
        <strong>Dados do Diagnóstico</strong>
    </div>
    <div class="card-body p-4">
        <form action="{{ url_for('cadastro_diagnostico') }}" method="POST">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Código do Diagnóstico</label>
                    <input type="number" name="codigo" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Data de Avaliação</label>
                    <input type="date" name="data_avaliacao" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Suspeita Identificada</label>
                    <input type="text" name="suspeita" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Paciente</label>
                    <select name="id_paciente" class="form-select" required>
                        <option value="">Selecione...</option>
                        {% for p in pacientes %}
                        <option value="{{ p['Codigo_Paciente'] }}">{{ p['Nome'] }} ({{ p['Codigo_Paciente'] }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Profissional Responsável</label>
                    <select name="id_profissional" class="form-select" required>
                        <option value="">Selecione...</option>
                        {% for pr in profissionais %}
                        <option value="{{ pr['Codigo_profissional'] }}">{{ pr['Nome'] }} — {{ pr['Funcao'] }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Descrição Clínica</label>
                    <textarea name="descricao" class="form-control" rows="4" placeholder="Descreva os achados clínicos..."></textarea>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-teal">
                    <i class="bi bi-check-lg me-1"></i> Salvar Diagnóstico
                </button>
                <a href="{{ url_for('diagnosticos') }}" class="btn btn-outline-slate">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
