{% extends 'base.html' %}
{% block title %}Editar Paciente{% endblock %}
{% block page_title %}Editar Paciente{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <i class="bi bi-pencil-square"></i>
        <strong>Editar Dados do Paciente</strong>
    </div>
    <div class="card-body">
        <form action="{{ url_for('editar_paciente', codigo=paciente['Codigo_Paciente']) }}" method="POST">
            <div class="mb-3">
                <label class="form-label">Código do Paciente (Somente Leitura)</label>
                <input type="number" class="form-control bg-light" name="codigo" value="{{ paciente['Codigo_Paciente'] }}" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">Nome Completo</label>
                <input type="text" class="form-control" name="nome" value="{{ paciente['Nome'] }}" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Idade</label>
                    <input type="number" class="form-control" name="idade" value="{{ paciente['Idade'] }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Data de Nascimento</label>
                    <input type="date" class="form-control" name="data_nascimento" value="{{ paciente['Data_nascimento'] }}" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Cargo / Ocupação</label>
                <input type="text" class="form-control" name="cargo" value="{{ paciente['Cargo'] }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Histórico Médico</label>
                <textarea class="form-control" name="historico" rows="4">{{ paciente['Historico_medico'] }}</textarea>
            </div>
            
            <hr>
            <div class="d-flex justify-content-end gap-2">
                <a href="{{ url_for('pacientes') }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-teal">
                    <i class="bi bi-save me-1"></i> Salvar Alterações
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
