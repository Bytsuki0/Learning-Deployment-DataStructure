{% extends 'base.html' %}
{% block title %}Cadastrar Ingrediente{% endblock %}
{% block page_title %}Cadastrar Ingrediente{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-8">
<div class="card">
    <div class="card-header">
        <i class="bi bi-plus-square"></i>
        <strong>Dados do Ingrediente</strong>
    </div>
    <div class="card-body p-4">
        <form action="{{ url_for('cadastro_ingrediente') }}" method="POST">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Código do Ingrediente</label>
                    <input type="number" name="codigo" class="form-control" required>
                </div>
                <div class="col-md-8">
                    <label class="form-label">Nome</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Tipo</label>
                    <input type="text" name="tipo" class="form-control" placeholder="Ex.: Químico, Natural">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Quantidade Disponível</label>
                    <input type="number" name="quantidade" class="form-control" min="0" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Origem</label>
                    <input type="text" name="origem" class="form-control" placeholder="Ex.: Laboratorial, Vegetal">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nível de Toxicidade</label>
                    <select name="toxicidade" class="form-select">
                        <option value="">Selecione...</option>
                        <option>Baixo</option>
                        <option>Médio</option>
                        <option>Alto</option>
                        <option>Crítico</option>
                        <option>Não Tóxico</option>
                    </select>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-teal">
                    <i class="bi bi-check-lg me-1"></i> Salvar Ingrediente
                </button>
                <a href="{{ url_for('ingredientes') }}" class="btn btn-outline-slate">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
